<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚗️ Mestieri di Arcamis</title>
<style>
  

    :root {
  --bg: #1a1510; --bg2: #211c15; --bg3: #28211a;
  --panel: #231e17; --panel2: #2d2620;
  --border: #5a3e1e; --border2: #7a5428;
  --gold: #c8a050; --gold2: #e0b860; --gold3: #f0d080;
  --amber: #d4954a; --red2: #c04040; --green2: #4a9a58;
  --blue2: #5a8ad8; --purple: #8a50b0; --purple2: #a070c8;
  --text: #f0e0c0; --text2: #c8a878; --text3: #806848;
  --common: #60b840; --uncommon: #50a0d8;
  --rare: #a060d8; --very-rare: #d88040; --legendary: #d8b020;
  --shadow: 0 4px 16px rgba(0,0,0,.6);
  --glow: 0 0 16px rgba(200,160,80,.15);
  --header-bg-start: #0e0c08;
  --header-bg-end: #1a1510;
  --guide-hero-end: #2a2418;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: var(--bg); background-image: none; color: var(--text); transition: background .3s, color .3s; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; line-height: 1.6; }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg, var(--header-bg-start) 0%, var(--header-bg-end) 100%);
    border-bottom: 2px solid var(--border2);
    padding: 20px 24px 16px;
    text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 32px rgba(0,0,0,.8);
  }

  
  header h1 {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    font-weight: 900;
    color: var(--gold2);
    letter-spacing: .06em;
    text-shadow: 0 0 30px rgba(201,168,76,.4), 0 2px 4px rgba(0,0,0,.8);
    margin-bottom: 4px;
  }
  header p {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: .85rem;
    color: var(--text3);
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  /* ── SEARCH ── */
  .search-wrap {
    max-width: 560px;
    margin: 14px auto 0;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    padding: 10px 40px 10px 16px;
    border-radius: 4px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,168,76,.15); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-wrap span {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 1.1rem; pointer-events: none;
  }

  /* ── TABS (MESTIERI) ── */
  .tabs {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 16px 20px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky; top: 107px; z-index: 90;
  }
  .tab-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: .78rem;
    letter-spacing: .08em;
    padding: 7px 14px;
    border-radius: 4px 4px 0 0;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab-btn:hover { background: var(--panel2); color: var(--gold2); border-color: var(--border2); }
  .tab-btn.active {
    background: var(--bg3);
    color: var(--gold2);
    border-color: var(--gold);
    border-bottom-color: var(--bg3);
    position: relative; bottom: -1px;
    box-shadow: 0 -2px 12px rgba(201,168,76,.12);
  }

  /* ── MAIN LAYOUT ── */
  .main { display: flex; min-height: calc(100vh - 200px); }

  /* ── LEFT NAV (LIVELLI + SEZIONI) ── */
  .sidenav {
    width: 200px; flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: calc(107px + 42px);
    max-height: calc(100vh - 150px);
    overflow-y: auto;
  }
  .sidenav-section { padding: 0 0 16px; }
  .sidenav-title {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: .65rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 0 16px 8px;
  }
  .sidenav-btn {
    display: block; width: 100%;
    background: none; border: none;
    color: var(--text2);
    font-family: 'Crimson Pro', serif;
    font-size: .95rem;
    text-align: left;
    padding: 7px 20px;
    cursor: pointer;
    transition: all .15s;
    border-left: 3px solid transparent;
  }
  .sidenav-btn:hover { color: var(--gold); background: rgba(201,168,76,.05); }
  .sidenav-btn.active { color: var(--gold2); border-left-color: var(--gold); background: rgba(201,168,76,.08); font-weight: 600; }

  /* ── CONTENT ── */
  .content { flex: 1; padding: 28px 24px; overflow-x: auto; }

  /* ── MESTIERE INTRO ── */
  .intro-card {
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 24px 28px;
    margin-bottom: 24px;
    box-shadow: var(--shadow), var(--glow);
  }
  .intro-card h2 {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: 1.5rem;
    color: var(--gold2);
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(201,168,76,.3);
  }
  .intro-card .tagline {
    font-style: italic;
    color: var(--text2);
    margin-bottom: 16px;
    font-size: 1.05rem;
  }
  .rules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 16px;
  }
  .rule-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
  }
  .rule-box h4 {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: .75rem;
    letter-spacing: .1em;
    color: var(--gold);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .rule-box p, .rule-box li { font-size: .9rem; color: var(--text2); }
  .rule-box ul { padding-left: 14px; }
  .rule-box li { margin-bottom: 2px; }

  /* ── LIVELLO HEADER ── */
  .lv-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .lv-badge {
    background: linear-gradient(135deg, var(--border2), var(--purple));
    border: 1px solid var(--border2);
    border-radius: 50%;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold2);
    flex-shrink: 0;
    box-shadow: 0 0 14px rgba(90,45,139,.4);
  }
  .lv-header h3 {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: .06em;
  }
  .lv-header p { font-size: .88rem; color: var(--text3); }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; margin-bottom: 32px; }
  table {
    width: 100%; border-collapse: collapse;
    font-size: .88rem;
  }
  thead tr {
    background: var(--panel2);
    border-bottom: 2px solid var(--border2);
  }
  thead th {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: .7rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--gold);
    padding: 10px 12px;
    text-align: left;
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid rgba(58,47,85,.5);
    transition: background .15s;
  }
  tbody tr:hover { background: rgba(201,168,76,.04); }
  tbody td {
    padding: 9px 12px;
    color: var(--text2);
    vertical-align: top;
  }
  tbody td:first-child { color: var(--text); font-weight: 400; }
  .has-prog { color: var(--green2) !important; }
  .no-prog  { color: var(--text3) !important; }

  /* tipologia badges */
  .badge {
    display: inline-block;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: .63rem;
    letter-spacing: .08em;
    padding: 2px 7px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .b-common    { background: rgba(160,200,120,.15); color: var(--common); border: 1px solid rgba(160,200,120,.3); }
  .b-uncommon  { background: rgba(120,180,224,.15); color: var(--uncommon); border: 1px solid rgba(120,180,224,.3); }
  .b-rare      { background: rgba(168,120,216,.15); color: var(--rare); border: 1px solid rgba(168,120,216,.3); }
  .b-veryrare  { background: rgba(224,120,64,.15); color: var(--very-rare); border: 1px solid rgba(224,120,64,.3); }
  .b-legendary { background: rgba(240,200,48,.15); color: var(--legendary); border: 1px solid rgba(240,200,48,.3); }
  .b-other     { background: rgba(120,140,160,.12); color: #90a8b8; border: 1px solid rgba(120,140,160,.25); }

  /* DT columns */
  .dt-cell {
    text-align: center;
    font-variant-numeric: tabular-nums;
    font-size: .85rem;
  }
  .dt-1 { color: #e07878; }
  .dt-2 { color: var(--amber); }
  .dt-3 { color: var(--gold); }
  .dt-4 { color: var(--common); }
  .dt-5 { color: #78b4b4; }

  /* cost columns */
  .cost { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .cost-craft { color: var(--red2); }
  .cost-sell  { color: var(--green2); }

  /* link */
  a { color: var(--blue2); text-decoration: none; font-size: .82rem; }
  a:hover { color: var(--gold2); text-decoration: underline; }

  /* ── MATERIALI SPECIALI ── */
  .mat-section { margin-bottom: 32px; }
  .mat-section h3 {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: .8rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .mat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .mat-card {
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 16px 18px;
    transition: border-color .2s, box-shadow .2s;
  }
  .mat-card:hover { border-color: var(--gold); box-shadow: 0 0 16px rgba(201,168,76,.1); }
  .mat-card h4 {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: .9rem;
    color: var(--gold2);
    margin-bottom: 6px;
  }
  .mat-card .mat-cost {
    font-size: .82rem;
    color: var(--amber);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .mat-card .mat-rarity { margin-bottom: 8px; }
  .mat-card p { font-size: .88rem; color: var(--text2); line-height: 1.5; }
  .mat-card .mat-prop {
    font-size: .8rem;
    color: var(--text3);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .mat-card .mat-prop strong { color: var(--gold); }

  /* ── GUIDA ── */
  .guide-wrap { max-width: 860px; }
  .guide-hero {
    background: linear-gradient(135deg, var(--panel) 0%, var(--guide-hero-end) 100%);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 32px 36px;
    margin-bottom: 28px;
    box-shadow: var(--shadow), var(--glow);
    position: relative; overflow: hidden;
  }
  .guide-hero::before {
    content: '⚔️';
    position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
    font-size: 6rem; opacity: .06; pointer-events: none;
  }
  .guide-hero h2 {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: 1.6rem; color: var(--gold2);
    margin-bottom: 10px;
    text-shadow: 0 0 24px rgba(201,168,76,.35);
  }
  .guide-hero p { color: var(--text2); font-size: 1.02rem; line-height: 1.65; }
  .guide-section { margin-bottom: 28px; }
  .guide-section h3 {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: .85rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 14px;
    padding-bottom: 7px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .guide-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .guide-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 14px 16px;
    transition: border-color .2s, box-shadow .2s;
  }
  .guide-card:hover { border-color: var(--border2); box-shadow: var(--glow); }
  .guide-card h4 { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; font-size: .88rem; color: var(--gold2); margin-bottom: 6px; }
  .guide-card p  { font-size: .88rem; color: var(--text2); line-height: 1.5; }
  .guide-card ul { padding-left: 14px; }
  .guide-card li { font-size: .85rem; color: var(--text2); margin-bottom: 3px; }
  .guide-card .tag {
    display: inline-block; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: .62rem; letter-spacing: .08em;
    padding: 2px 7px; border-radius: 3px; margin-right: 4px; margin-bottom: 4px;
    background: rgba(201,168,76,.12); color: var(--gold); border: 1px solid rgba(201,168,76,.25);
  }
  .dt-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  .dt-table th {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; font-size: .7rem; letter-spacing: .1em;
    text-transform: uppercase; color: var(--gold); padding: 9px 14px;
    text-align: left; background: var(--panel2); border-bottom: 2px solid var(--border2);
  }
  .dt-table td { padding: 9px 14px; color: var(--text2); border-bottom: 1px solid rgba(58,47,85,.4); }
  .dt-table tr:hover td { background: rgba(201,168,76,.03); }
  .dt-table td:first-child { color: var(--gold2); font-weight: 600; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; }
  .dt-table td strong { color: var(--gold); }
  .guide-note {
    background: rgba(212,137,26,.08); border: 1px solid rgba(212,137,26,.3);
    border-radius: 5px; padding: 12px 16px;
    font-size: .88rem; color: var(--amber); margin-top: 10px;
  }
  .guide-note strong { color: var(--gold2); }
  .guide-tab-active { border-color: var(--amber) !important; color: var(--amber) !important; }

  /* ── SCROLL TARGET ── */
  .section-anchor { scroll-margin-top: 180px; }

  /* ── EMPTY/HIDDEN ── */
  .hidden { display: none !important; }
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-size: 1.1rem;
    font-style: italic;
  }

  /* ── DIVIDER ── */
  .ornament {
    text-align: center;
    color: var(--border2);
    margin: 24px 0;
    font-size: 1.2rem;
    letter-spacing: .4em;
  }

  /* ── DESC TOOLTIP style ── */
  .desc-text { font-size: .85rem; color: var(--text2); max-width: 340px; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border2); }

  /* ── MOBILE NAV DRAWER ── */
  .mobile-nav-btn {
    display: none;
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 200;
    background: var(--gold2);
    color: var(--bg);
    border: none;
    border-radius: 50%;
    width: 52px; height: 52px;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
    align-items: center; justify-content: center;
    transition: background .2s, transform .2s;
  }
  .mobile-nav-btn:active { transform: scale(.92); }

  .mobile-drawer-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 150;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(2px);
  }
  .mobile-drawer-overlay.open { display: block; }

  .mobile-drawer {
    position: fixed;
    top: 0; left: 0; bottom: 0; z-index: 160;
    width: min(280px, 85vw);
    background: var(--bg2);
    border-right: 1px solid var(--border2);
    padding: 20px 0 40px;
    overflow-y: auto;
    transform: translateX(-100%);
    transition: transform .3s ease;
  }
  .mobile-drawer.open { transform: translateX(0); }
  .mobile-drawer-header {
    padding: 0 16px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .mobile-drawer-header h3 {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: .8rem; letter-spacing: .12em;
    text-transform: uppercase; color: var(--gold);
  }
  .mobile-drawer-close {
    background: none; border: none; color: var(--text3);
    font-size: 1.3rem; cursor: pointer; padding: 2px 6px;
    line-height: 1;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .sidenav { display: none; }
    .mobile-nav-btn { display: flex; }

    header { padding: 14px 16px 12px; position: sticky; }
    header h1 { font-size: clamp(1.1rem, 5vw, 1.6rem); }
    header p { font-size: .72rem; letter-spacing: .06em; }

    .tabs {
      top: 0;
      position: relative;
      overflow-x: auto;
      flex-wrap: nowrap;
      padding: 10px 12px 0;
      gap: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { font-size: .72rem; padding: 6px 10px; flex-shrink: 0; }

    .main { flex-direction: column; min-height: auto; }
    .content { padding: 14px 12px; overflow-x: auto; }

    .rules-grid { grid-template-columns: 1fr; }
    .guide-cards { grid-template-columns: 1fr; }
    .mat-grid { grid-template-columns: 1fr; }

    .intro-card { padding: 16px; }
    .guide-hero { padding: 20px 18px; }

    table { font-size: .8rem; }
    thead th { font-size: .62rem; padding: 8px 8px; }
    tbody td { padding: 7px 8px; }

    .lv-badge { width: 38px; height: 38px; font-size: .95rem; }
    .lv-header h3 { font-size: .95rem; }
  }

  @media (max-width: 480px) {
  }
</style>
</head>
<body>

<header>
  
  <h1>⚔️ Mestieri di Arcamis ⚔️</h1>
  <p>Compendio dei Mestieri · Crafting · Downtime · Materiali Speciali</p>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Cerca oggetto, materiale, tipologia…" oninput="doSearch(this.value)">
    <span>🔍</span>
  </div>
</header>

<!-- TABS -->
<div class="tabs" id="tabs"></div>

<!-- MOBILE DRAWER OVERLAY -->
<div class="mobile-drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- MOBILE DRAWER -->
<div class="mobile-drawer" id="mobileDrawer">
  <div class="mobile-drawer-header">
    <h3>📑 Navigazione</h3>
    <button class="mobile-drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <nav id="mobileDrawerNav"></nav>
</div>

<!-- MOBILE FAB -->
<button class="mobile-nav-btn" id="mobileNavBtn" onclick="openDrawer()" title="Navigazione">☰</button>

<div class="main">
  <nav class="sidenav" id="sidenav"></nav>
  <div class="content" id="content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════════════
(function() {
  const saved = localStorage.getItem('arcamis-theme') || 'light';
  if (saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
})();



function updateThemeBtn() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (icon) icon.textContent = isDark ? '☀️' : '🌙';
  if (label) label.textContent = isDark ? 'Chiaro' : 'Scuro';
}

// ═══════════════════════════════════════════════════════════════

function openDrawer() {
  document.getElementById('mobileDrawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('mobileDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function syncMobileDrawer() {
  const desktopNav = document.getElementById('sidenav');
  const mobileNav = document.getElementById('mobileDrawerNav');
  if (mobileNav) mobileNav.innerHTML = desktopNav ? desktopNav.innerHTML : '';
}

function fmtMO(v) {
  if (v === undefined || v === null) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return v;
  if (n < 1) return (n * 100).toFixed(0) + ' MR';
  if (n >= 10000) return (n/1000).toFixed(0) + 'k MO';
  if (n >= 1000) return n.toLocaleString('it') + ' MO';
  return n % 1 === 0 ? n + ' MO' : n.toFixed(2) + ' MO';
}

function tipBadge(t) {
  const tl = (t||'').toLowerCase();
  let cls='b-other';
  if (tl.includes('common') && !tl.includes('un')) cls='b-common';
  else if (tl.includes('uncommon') || tl.includes('non comune')) cls='b-uncommon';
  else if (tl.includes('very rare') || tl.includes('very-rare')) cls='b-veryrare';
  else if (tl.includes('rare') || tl.includes('raro') || tl.includes('rara')) cls='b-rare';
  else if (tl.includes('legendary') || tl.includes('leggendario')) cls='b-legendary';
  return `<span class="badge ${cls}">${t||'—'}</span>`;
}

function dtClass(v,i) {
  if(i===0) return 'dt-1';
  if(i===1) return 'dt-2';
  if(i===2) return 'dt-3';
  if(i===3) return 'dt-4';
  return 'dt-5';
}

function rarClass(r){return 'mat-card mat-'+r;}

function matRarBadge(r){
  const m={common:'b-common',uncommon:'b-uncommon',rare:'b-rare','very-rare':'b-veryrare',legendary:'b-legendary'};
  const l={common:'Comune',uncommon:'Non Comune',rare:'Raro','very-rare':'Very Rare',legendary:'Leggendario'};
  return `<span class="badge ${m[r]||'b-other'}">${l[r]||r}</span>`;
}

function matches(item, q) {
  if (!q) return true;
  const ql = q.toLowerCase();
  return [item.n, item.mp, item.ms, item.tip, item.desc]
    .filter(Boolean)
    .some(s => s.toLowerCase().includes(ql));
}

function renderTabs() {
  const el = document.getElementById('tabs');
  const guideActive = currentMestiere === -1;
  let html = `<button class="tab-btn ${guideActive?'active guide-tab-active':''}" onclick="setGuide()">📖 Guida ai Mestieri</button>`;
  html += '<div style="width:1px;background:var(--border);margin:0 4px 0;align-self:stretch"></div>';
  html += MESTIERI.map((m,i) =>
    `<button class="tab-btn ${i===currentMestiere?'active':''}" onclick="setMestiere(${i})">${m.emoji} ${m.nome}</button>`
  ).join('');
  el.innerHTML = html;
}

function renderSideNav() {
  const el = document.getElementById('sidenav');
  if (currentMestiere === -1) { el.innerHTML = ''; return; }
  const m = MESTIERI[currentMestiere];
  let html = '<div class="sidenav-section">';
  html += '<div class="sidenav-title">Sezioni</div>';
  html += `<button class="sidenav-btn ${currentSection==='intro'?'active':''}" onclick="setSection('intro')">📖 Introduzione</button>`;
  m.livelli.forEach(lv => {
    const key = 'lv'+lv.lv;
    html += `<button class="sidenav-btn ${currentSection===key?'active':''}" onclick="setSection('${key}')">⬟ Livello ${lv.lv}</button>`;
  });
  if (m.id === 'artista') {
    html += `<button class="sidenav-btn ${currentSection==='pergamene'?'active':''}" onclick="setSection('pergamene')">📜 Pergamene Magiche</button>`;
  }
  html += `<button class="sidenav-btn ${currentSection==='mat'?'active':''}" onclick="setSection('mat')">💎 Materiali Speciali</button>`;
  html += '</div>';
  el.innerHTML = html;
}

function renderContent() {
  const m = currentMestiere >= 0 ? MESTIERI[currentMestiere] : null;
  const el = document.getElementById('content');
  let html = '';

  if (currentMestiere === -1) {
    html += renderGuide();
  } else if (searchQ) {
    html += renderSearch(m);
  } else if (currentSection === 'intro') {
    html += renderIntro(m);
  } else if (currentSection === 'pergamene' && m && m.id === 'artista') {
    html += renderPergamene();
  } else if (currentSection === 'mat') {
    html += renderMat(m);
  } else {
    const lvNum = parseInt(currentSection.replace('lv',''));
    const lv = m.livelli.find(l=>l.lv===lvNum);
    if (lv) html += renderLv(m, lv);
  }

  el.innerHTML = html;
}

  return `

  function dtPClass(v) {
    if (v >= 40) return 'dt-hard';
    if (v >= 15) return 'dt-medium';
    if (v >= 5)  return 'dt-light';
    return '';
  }

  const rows = PERGAMENE.map(p => {
    const leg = p.legendary ? 'style="background:var(--bg3);color:var(--legendary);font-weight:700"' : '';
    const dtCells = p.dt.map(v => `<td class="dt-cell ${dtPClass(v)}" ${leg}>${v}</td>`).join('');
    return `<tr ${leg}>
      <td style="text-align:center;font-weight:600">${p.lv}</td>
      <td style="text-align:right">${fmtPMO(p.carta)}</td>
      <td style="text-align:right">${fmtPMO(p.inchiostro)}</td>
      ${dtCells}
    </tr>`;
  }).join('');

  return `
  <div class="lv-header">
    <div class="lv-badge">📜</div>
    <div>
      <h3>🎨 Artista — Pergamene Magiche</h3>
      <p>Creazione di pergamene incantate tramite Downtime</p>
    </div>
  </div>

  <div class="intro-card" style="margin-bottom:24px">
    <h4 style="color:var(--gold2);font-family:system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;margin-bottom:10px">📖 Come funziona</h4>
    <p style="color:var(--text2);font-size:.95rem;line-height:1.7">
      Come Artista ed Incantatore hai la possibilità di scrivere delle <strong style="color:var(--gold)">pergamene magiche</strong>,
      pregne della tua capacità magica e scritte in modo tale che soltanto tu — e chi è in grado di leggerle — possiate usarle.
    </p>
    <div class="rules-grid" style="margin-top:16px">
      <div class="rule-box">
        <h4>📄 Materiali</h4>
        <p>Servono <strong style="color:var(--gold)">Carta Incantata</strong> e <strong style="color:var(--gold)">Inchiostro Magico</strong> del valore indicato dalla tabella in base al livello della pergamena.</p>
      </div>
      <div class="rule-box">
        <h4>⏱️ Tempo (Downtime)</h4>
        <p>Il numero di Downtime necessari dipende dal <strong style="color:var(--gold)">livello da Artista</strong>. Più alto il livello, meno DT servono per la stessa pergamena.</p>
      </div>
      <div class="rule-box">
        <h4>📚 Incantesimi</h4>
        <p>Gli incantesimi scritti devono appartenere alla <strong style="color:var(--gold)">lista di almeno una delle classi</strong> del personaggio per poter essere lanciate.</p>
      </div>
      <div class="rule-box">
        <h4>🔒 Lettura</h4>
        <p>Le pergamene sono utilizzabili da chiunque sappia leggerle. Per livelli alti potrebbe essere richiesta una prova di <strong style="color:var(--gold)">competenza arcana</strong>.</p>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="text-align:center">Livello Incantesimo</th>
          <th style="text-align:right">Costo Carta</th>
          <th style="text-align:right">Costo Inchiostro</th>
          <th class="dt-cell">Artista LV1</th>
          <th class="dt-cell">Artista LV2</th>
          <th class="dt-cell">Artista LV3</th>
          <th class="dt-cell">Artista LV4</th>
          <th class="dt-cell">Artista LV5</th>
        </tr>
        <tr>
          <th colspan="3" style="text-align:center;font-size:.75rem;color:var(--text3);font-weight:400;padding-top:2px;padding-bottom:6px">
            — Numero di Downtime richiesti —
          </th>
          <th colspan="5"></th>
        </tr>
      </thead>
      <tbody>
        ${rows}
      </tbody>
    </table>
  </div>

  <p style="margin-top:16px;font-size:.82rem;color:var(--text3);font-style:italic;text-align:center">
    💎 Per i materiali necessari consulta la sezione <strong style="color:var(--text3)">Materiali Speciali</strong> (Carta Arcana, Inchiostro Runato, Inchiostro di Drago…)
  </p>
  `;
}

function renderMat(m) {
  return `
  <div class="lv-header">
    <div class="lv-badge">💎</div>
    <div>
      <h3>${m.emoji} Materiali Speciali — ${m.nome}</h3>
      <p>Componenti rari e leggendari per il mestiere</p>
    </div>
  </div>
  <div class="mat-grid">
    ${m.materialiSpeciali.map(mat => `
      <div class="${rarClass(mat.rarity)}">
        <h4>${mat.nome}</h4>
        <div class="mat-rarity">${matRarBadge(mat.rarity)}</div>
        <div class="mat-cost">💰 ${mat.costo}</div>
        <p>${mat.desc}</p>
        ${mat.prop && mat.prop.length ? `<div class="mat-prop">${mat.prop.map(p=>`<strong>${p.k}:</strong> ${p.v}`).join(' &nbsp;·&nbsp; ')}</div>` : ''}
      </div>
    `).join('')}
  </div>`;
}

function renderSearch(m) {
  let html = `<div style="margin-bottom:16px;color:var(--text2)">Risultati per <strong style="color:var(--gold)">"${searchQ}"</strong> in ${m.nome}:</div>`;
  let found = false;
  m.livelli.forEach(lv => {
    const items = lv.items.filter(it => matches(it, searchQ));
    if (items.length) {
      found = true;
      html += renderLv(m, {...lv, items});
    }
  });
  if (!found) html += '<div class="no-results">Nessun risultato trovato in questo mestiere.</div>';
  return html;
}

        </tbody>
      </table>
      <div class="guide-note">⚠️ <strong>Attenzione:</strong> La tabella qui presente è di riferimento generale. Fate sempre affidamento alla tabella nella scheda specifica del mestiere del mestiere, che può variare (es. il Sarto ha capacità diverse).</div>
    </div>

    <div class="guide-section">
      <h3>🏗️ I Mestieri Disponibili</h3>
      <div class="guide-cards">
        <div class="guide-card"><h4>⚗️ Alchimista</h4><p style="font-style:italic;color:var(--text3);margin-bottom:6px">Maestro delle pozioni, dei veleni e delle essenze.</p><div><span class="tag">Alchemist's Supplies</span><span class="tag">Herbalism Kit</span><span class="tag">Poisoner's Kit</span></div></div>
        <div class="guide-card"><h4>🍺 Oste</h4><p style="font-style:italic;color:var(--text3);margin-bottom:6px">Distillati e banchetti degni di un Re o di un Poro.</p><div><span class="tag">Brewer's Supplies</span><span class="tag">Cook's Utensils</span></div></div>

// ═══════════════════════════════════════════════════════════════
//  STATE SETTERS
// ═══════════════════════════════════════════════════════════════

function setGuide() {
  currentMestiere = -1;
  currentSection = 'guide';
  searchQ = '';
  document.getElementById('searchInput').value = '';
  render();
  updateMobileFab();
  closeDrawer();
  window.scrollTo({top:0, behavior:'smooth'});
}

function setMestiere(i) {
  currentMestiere = i;
  currentSection = 'intro';
  searchQ = '';
  document.getElementById('searchInput').value = '';
  render();
  updateMobileFab();
  closeDrawer();
}

function setSection(s) {
  currentSection = s;
  searchQ = '';
  document.getElementById('searchInput').value = '';
  render();
  closeDrawer();
  window.scrollTo({top:0, behavior:'smooth'});
}

function doSearch(q) {
  searchQ = q.trim();
  if (searchQ) currentSection = '__search__';
  else currentSection = 'intro';
  render();
}

function render() {
  renderTabs();
  renderSideNav();
  renderContent();
  syncMobileDrawer();
}

// Mostra mobile FAB solo quando c'è sidenav da mostrare
function updateMobileFab() {
  const btn = document.getElementById('mobileNavBtn');
  if (btn) btn.style.display = currentMestiere >= 0 ? 'flex' : 'none';
}

render();
updateThemeBtn();

</script>
</body>
</html>
